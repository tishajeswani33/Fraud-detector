services:
  - type: web
    name: fraud-detection-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python train_sample.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_DIR
        value: ./models
      - key: ALLOW_ORIGINS
        sync: false   # set this in Render dashboard to your Vercel URL
