services:
  - type: web
    name: fraud-detection-api
    env: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt && python train_sample.py
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_DIR
        value: ./models
      - key: ALLOW_ORIGINS
        sync: false   # set this in Render dashboard to your Vercel URL
      - key: MYSQL_URL
        sync: false   # optionally set your MySQL string here in Render dashboard
