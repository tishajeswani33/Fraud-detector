services:
  - type: web
    name: fraud-detector-backend
    env: python
    buildCommand: "pip install -r requirements.txt && cd backend && python train_sample.py && cd .."
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.2
      - key: PORT
        value: 8000
